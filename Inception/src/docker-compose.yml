services:
  mariadb:
    build: ./requirements/Mariadb
    volumes:
      - /home/xhamzall/data/mariadb:/var/lib/mysql
    env_file:
      - .env
    networks:
      - inception
    container_name: mariadb
    image: mariadb
    restart: always
  web:
    build: ./requirements/nginx
    networks:
      - inception
    ports:
      - 443:443
    container_name: nginx
    image: nginx
    restart: always
  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    env_file:
      - .env
    networks:
      - inception
    volumes:
      - wordpress_data:/var/www/html
    depends_on:
      - mariadb
    restart: always
networks:
  inception:
